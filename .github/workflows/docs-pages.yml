name: docs-pages

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - docs/**
      - assets/conman.svg
      - scripts/build-docs-site.sh
      - scripts/publish-docs-site.sh

jobs:
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Build docs site
        run: ./scripts/build-docs-site.sh

      - name: Upload docs site artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site-dist
          path: docs/site/dist

  docs-deploy:
    needs: docs-build
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Check deploy prerequisites
        id: prereq
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/master" && "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy: not master/main branch."
            exit 0
          fi

          if [[ -z "${CLOUDFLARE_API_TOKEN}" || -z "${CLOUDFLARE_ACCOUNT_ID}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy: Cloudflare secrets not configured."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Install Wrangler
        if: steps.prereq.outputs.enabled == 'true'
        run: npm install -g wrangler

      - name: Publish docs to Cloudflare Pages (production branch)
        if: steps.prereq.outputs.enabled == 'true'
        run: CLOUDFLARE_PAGES_BRANCH=main ./scripts/publish-docs-site.sh
