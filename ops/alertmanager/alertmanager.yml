global:
  resolve_timeout: 5m

route:
  receiver: default-log
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - matchers:
        - severity="page"
      receiver: paging-webhook

receivers:
  - name: default-log
    webhook_configs:
      - url: http://host.docker.internal:18081/alerts/default
        send_resolved: true

  - name: paging-webhook
    webhook_configs:
      - url: http://host.docker.internal:18081/alerts/paging
        send_resolved: true
