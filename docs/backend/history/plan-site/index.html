<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DxFlow Config Manager — UI & Feature Plan</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --muted: #f5f5f5;
    --muted-fg: #6a6a6a;
    --border: #eaeaea;
    --primary: #2d2d2d;
    --code-bg: #f6f8fa;
    --link: #0969da;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.7;
    font-size: 15px;
  }
  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px 96px;
  }
  h1 { font-size: 2em; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.02em; }
  h2 { font-size: 1.5em; font-weight: 650; margin: 48px 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  h3 { font-size: 1.2em; font-weight: 600; margin: 32px 0 12px; }
  h4 { font-size: 1.05em; font-weight: 600; margin: 24px 0 8px; }
  p { margin: 0 0 16px; }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  strong { font-weight: 600; }
  hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
  ul, ol { margin: 0 0 16px; padding-left: 24px; }
  li { margin: 4px 0; }
  li > ul, li > ol { margin: 4px 0 4px; }
  code {
    font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, monospace;
    font-size: 0.88em;
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    overflow-x: auto;
    margin: 0 0 16px;
    line-height: 1.5;
  }
  pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 0.85em;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 0 0 16px;
    font-size: 0.92em;
  }
  th, td {
    text-align: left;
    padding: 10px 14px;
    border: 1px solid var(--border);
  }
  th {
    background: var(--muted);
    font-weight: 600;
  }
  tr:nth-child(even) td { background: #fafafa; }
  blockquote {
    border-left: 3px solid var(--border);
    padding: 4px 16px;
    margin: 0 0 16px;
    color: var(--muted-fg);
  }
  .header-bar {
    background: var(--primary);
    color: #fafafa;
    padding: 12px 24px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-bar span { opacity: 0.6; }
  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="header-bar">
  DxFlow Config Manager <span>—</span> UI & Feature Plan <span class="badge">Draft</span>
</div>
<div class="container" id="content"></div>
<script>
fetch('content.md')
  .then(r => r.text())
  .then(md => {
    document.getElementById('content').innerHTML = marked.parse(md);
  });
</script>
</body>
</html>
